openapi: 3.0.3
info:
  title: ProjectBook API
  version: 1.0.0
  description: |
    REST API for ProjectBook — a design-thinking project management platform.

    ## Authentication
    Two mechanisms are supported:
    - **Session cookies** (`projectbook_session`) for browser clients
    - **Bearer tokens** (`Authorization: Bearer <token>`) for API clients

    Both are obtained via `POST /api/v1/auth/login`.

    ## Conventions
    - All request/response bodies are JSON
    - Dates use ISO 8601 format
    - IDs are slug-based strings or UUID v4
    - Successful responses wrap data in `{ success: true, data: ... }`
    - Errors wrap details in `{ success: false, error: { ... } }`
  contact:
    name: ProjectBook Team
  license:
    name: Proprietary

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Authentication
    description: User registration, login, logout, email verification, and password reset
  - name: Home
    description: Cross-project home operations — dashboard, projects, invites, notifications, activity, account settings
  - name: Project
    description: Project-scoped operations — dashboard, access, navigation, settings, archive, delete
  - name: Team
    description: Team membership, invitations, roles, and permission customization
  - name: Stories
    description: User Stories — personas, empathy maps, pain points, hypotheses
  - name: Journeys
    description: User Journeys — stage-by-stage mapping of persona experiences
  - name: Problems
    description: Problem Statements — core problems derived from research
  - name: Ideas
    description: Ideas — proposed solutions to locked problems
  - name: Tasks
    description: Tasks — actionable work items derived from selected ideas
  - name: Feedback
    description: Feedback — validation results and iteration insights
  - name: Resources
    description: Resources — documents, files, and reference materials
  - name: Pages
    description: Pages — custom documents with rich text and database views
  - name: Calendar
    description: Calendar — project milestones, meetings, and deadlines
  - name: Activity
    description: Activity — chronological action logs

security:
  - bearerAuth: []
  - cookieAuth: []

components:

  # ── Security Schemes ────────────────────────────────────────────────

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: JWT token returned from the login endpoint
    cookieAuth:
      type: apiKey
      in: cookie
      name: projectbook_session
      description: HTTP-only session cookie set on login

  # ── Reusable Parameters ─────────────────────────────────────────────

  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
      description: Project identifier (slug)
    slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Entity slug/ID
    memberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
      description: Team member identifier
    inviteId:
      name: inviteId
      in: path
      required: true
      schema:
        type: string
      description: Invite identifier
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
      description: Calendar event identifier
    resourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier
    artifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
      description: Artifact identifier
    pageId:
      name: pageId
      in: path
      required: true
      schema:
        type: string
      description: Page identifier
    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of items to skip
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
      description: Max items to return
    sortParam:
      name: sort
      in: query
      schema:
        type: string
        default: lastUpdated
      description: Sort field
    orderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order

  # ── Enum Schemas ────────────────────────────────────────────────────

  schemas:

    ProjectStatus:
      type: string
      enum: [Active, Archived]

    ProjectRole:
      type: string
      enum: [Owner, Admin, Editor, Member, Viewer, Limited Access]

    StoryStatus:
      type: string
      enum: [Draft, Locked, Archived]

    JourneyStatus:
      type: string
      enum: [Draft, Archived]

    ProblemStatus:
      type: string
      enum: [Draft, Locked, Archived]

    IdeaStatus:
      type: string
      enum: [Considered, Selected, Rejected, Archived]

    TaskStatus:
      type: string
      enum: [Planned, In Progress, Completed, Abandoned, Blocked]

    FeedbackOutcome:
      type: string
      enum: [Validated, Invalidated, Needs Iteration]

    PageStatus:
      type: string
      enum: [Draft, Archived]

    ResourceStatus:
      type: string
      enum: [Active, Archived]

    CalendarEventType:
      type: string
      enum: [Derived, Manual]

    CalendarPhase:
      type: string
      enum: [Empathize, Define, Ideate, Prototype, Test, None]

    CalendarArtifactType:
      type: string
      enum: [Task, Feedback, Manual]

    ProjectIconKey:
      type: string
      enum:
        - folderKanban
        - rocket
        - lightbulb
        - flaskConical
        - compass
        - target
        - briefcase
        - layoutGrid
        - notebookPen
        - sparkles
        - code
        - palette
        - zap
        - shieldCheck
        - chartLine
        - database
        - globe
        - megaphone
        - users
        - graduationCap
        - handshake
        - wrench
        - cpu
        - bookOpen
        - flag

    # ── Permission Schemas ──────────────────────────────────────────────

    PermissionMask:
      type: string
      pattern: '^[0-9]+$'
      description: Decimal-encoded uint64-compatible permission bitmask

    RolePermissionMasks:
      type: object
      properties:
        Owner:
          $ref: '#/components/schemas/PermissionMask'
        Admin:
          $ref: '#/components/schemas/PermissionMask'
        Editor:
          $ref: '#/components/schemas/PermissionMask'
        Member:
          $ref: '#/components/schemas/PermissionMask'
        Viewer:
          $ref: '#/components/schemas/PermissionMask'
        Limited Access:
          $ref: '#/components/schemas/PermissionMask'
      description: Map of role name to role default permission mask

    # ── User / Home Schemas ────────────────────────────────────────

    HomeUser:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    HomeProject:
      type: object
      required: [id, name, organization, icon, lastUpdatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        organization:
          type: string
        icon:
          $ref: '#/components/schemas/ProjectIconKey'
        description:
          type: string
        role:
          $ref: '#/components/schemas/ProjectRole'
        openTasks:
          type: integer
        lastVisitedAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ProjectStatus'

    HomeInvite:
      type: object
      properties:
        id:
          type: string
        projectName:
          type: string
        projectDescription:
          type: string
        projectStatus:
          $ref: '#/components/schemas/ProjectStatus'
        projectId:
          type: string
        organizationName:
          type: string
        inviterName:
          type: string
        inviterRole:
          $ref: '#/components/schemas/ProjectRole'
        inviterEmail:
          type: string
          format: email
        assignedRole:
          $ref: '#/components/schemas/ProjectRole'
        sentAt:
          type: string
        expiresAt:
          type: string
        expiresSoon:
          type: boolean
        expired:
          type: boolean

    Notification:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        timestamp:
          type: string
        url:
          type: string
        read:
          type: boolean
        sourceType:
          type: string
        dismissed:
          type: boolean

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        userInitials:
          type: string
        action:
          type: string
        artifactName:
          type: string
        artifactUrl:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        type:
          type: string
        timestamp:
          type: string
        occurredAt:
          type: string
          format: date-time

    DashboardActivity:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        userInitials:
          type: string
        action:
          type: string
        projectName:
          type: string
        timestamp:
          type: string
        occurredAt:
          type: string
          format: date-time
        involved:
          type: boolean

    ProjectActivity:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        initials:
          type: string
        action:
          type: string
        artifact:
          type: string
        href:
          type: string
        at:
          type: string
          format: date-time

    AccountSettings:
      type: object
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string
        theme:
          type: string
          enum: [Light, Dark, System]
        density:
          type: string
          enum: [Comfortable, Compact]
        landing:
          type: string
          enum: [Last Project, Project Selector]
        timeFormat:
          type: string
          enum: [12-hour, 24-hour]
        inAppNotifications:
          type: boolean
        emailNotifications:
          type: boolean

    # ── Project Schemas ─────────────────────────────────────────────────

    ProjectInfo:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'

    ProjectNavigationItem:
      type: object
      required: [id, name, icon]
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          $ref: '#/components/schemas/ProjectIconKey'

    CurrentProjectNavigation:
      type: object
      required: [id, name, status, role]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        role:
          $ref: '#/components/schemas/ProjectRole'

    ProjectNavigationResponse:
      type: object
      required: [current_project, project_list]
      properties:
        current_project:
          $ref: '#/components/schemas/CurrentProjectNavigation'
        project_list:
          type: array
          items:
            $ref: '#/components/schemas/ProjectNavigationItem'

    ProjectSettings:
      type: object
      properties:
        projectName:
          type: string
        projectDescription:
          type: string
        projectStatus:
          $ref: '#/components/schemas/ProjectStatus'
        whiteboardsEnabled:
          type: boolean
        advancedDatabasesEnabled:
          type: boolean
        calendarManualEventsEnabled:
          type: boolean
        resourceVersioningEnabled:
          type: boolean
        feedbackAggregationEnabled:
          type: boolean
        notifyArtifactCreated:
          type: boolean
        notifyArtifactLocked:
          type: boolean
        notifyFeedbackAdded:
          type: boolean
        notifyResourceUpdated:
          type: boolean
        deliveryChannel:
          type: string
          enum: [In-app, Email]

    DashboardEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        startAt:
          type: string
          format: date-time
        creator:
          type: string
        initials:
          type: string

    RecentEdit:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        href:
          type: string
        at:
          type: string
          format: date-time

    # ── Team Schemas ────────────────────────────────────────────────────

    TeamMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/ProjectRole'
        permissionMask:
          $ref: '#/components/schemas/PermissionMask'
        isCustom:
          type: boolean
        status:
          type: string
          enum: [Active, Invited]
        joinedAt:
          type: string
          format: date
        updatedAt:
          type: string
        team:
          type: string
        location:
          type: string

    PendingInvite:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/ProjectRole'
        sentDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending]

    # ── Story Schemas ───────────────────────────────────────────────────

    StoryRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        personaName:
          type: string
        painPointsCount:
          type: integer
        problemHypothesesCount:
          type: integer
        owner:
          type: string
        lastUpdated:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StoryStatus'
        isOrphan:
          type: boolean

    Persona:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        role:
          type: string
        age:
          type: integer
        job:
          type: string
        edu:
          type: string

    EmpathyMap:
      type: object
      properties:
        says:
          type: string
        thinks:
          type: string
        does:
          type: string
        feels:
          type: string

    StoryDetail:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        persona:
          $ref: '#/components/schemas/Persona'
        context:
          type: string
        empathyMap:
          $ref: '#/components/schemas/EmpathyMap'
        painPoints:
          type: array
          items:
            type: string
        hypothesis:
          type: array
          items:
            type: string
        notes:
          type: string

    AddOnCatalogItem:
      type: object
      properties:
        type:
          type: string
        name:
          type: string
        description:
          type: string
        tag:
          type: string

    # ── Journey Schemas ─────────────────────────────────────────────────

    JourneyRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        linkedPersonas:
          type: array
          items:
            type: string
        stagesCount:
          type: integer
        painPointsCount:
          type: integer
        owner:
          type: string
        lastUpdated:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/JourneyStatus'
        isOrphan:
          type: boolean

    JourneyStage:
      type: object
      properties:
        name:
          type: string
        actions:
          type: array
          items:
            type: string
        emotion:
          type: string
        painPoints:
          type: array
          items:
            type: string

    JourneyDetail:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        persona:
          $ref: '#/components/schemas/Persona'
        context:
          type: string
        stages:
          type: array
          items:
            $ref: '#/components/schemas/JourneyStage'
        notes:
          type: string

    # ── Problem Schemas ─────────────────────────────────────────────────

    ProblemRow:
      type: object
      properties:
        id:
          type: string
        statement:
          type: string
        linkedSources:
          type: array
          items:
            type: string
        painPointsCount:
          type: integer
        ideasCount:
          type: integer
        status:
          $ref: '#/components/schemas/ProblemStatus'
        owner:
          type: string
        lastUpdated:
          type: string
          format: date
        isOrphan:
          type: boolean

    LinkedSource:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [story, journey]
        title:
          type: string
        phase:
          type: string

    ProblemDetail:
      type: object
      properties:
        title:
          type: string
        finalStatement:
          type: string
        selectedPainPoints:
          type: array
          items:
            type: string
        linkedSources:
          type: array
          items:
            $ref: '#/components/schemas/LinkedSource'
        activeModules:
          type: array
          items:
            type: string
        moduleContent:
          type: object
        notes:
          type: string

    SourcePainPoint:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        sourceLabel:
          type: string

    ReferenceOption:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        phase:
          type: string
        href:
          type: string
        status:
          type: string

    # ── Idea Schemas ────────────────────────────────────────────────────

    IdeaRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        linkedProblemStatement:
          type: string
        persona:
          type: string
        status:
          $ref: '#/components/schemas/IdeaStatus'
        tasksCount:
          type: integer
        owner:
          type: string
        lastUpdated:
          type: string
          format: date
        linkedProblemLocked:
          type: boolean
        isOrphan:
          type: boolean

    IdeaDetail:
      type: object
      properties:
        description:
          type: string
        status:
          $ref: '#/components/schemas/IdeaStatus'
        summary:
          type: string
        notes:
          type: string
        selectedProblemId:
          type: string
        activeModules:
          type: array
          items:
            type: string
        moduleContent:
          type: object

    IdeaReferenceOption:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        phase:
          type: string
        href:
          type: string
        status:
          type: string
        problem:
          $ref: '#/components/schemas/ReferenceOption'
        context:
          type: object
          properties:
            type:
              type: string
            title:
              type: string
            detail:
              type: string
            phase:
              type: string
            href:
              type: string
            status:
              type: string

    # ── Task Schemas ────────────────────────────────────────────────────

    TaskRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        linkedIdea:
          type: string
        linkedProblemStatement:
          type: string
        persona:
          type: string
        owner:
          type: string
        deadline:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/TaskStatus'
        ideaRejected:
          type: boolean
        hasFeedback:
          type: boolean
        isOrphan:
          type: boolean

    ExecutionLink:
      type: object
      properties:
        label:
          type: string
        url:
          type: string
          format: uri

    AssigneeOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string

    TaskDetail:
      type: object
      properties:
        assignedToId:
          type: string
        selectedIdeaId:
          type: string
        deadline:
          type: string
          format: date
        hypothesis:
          type: string
        planItems:
          type: array
          items:
            type: string
        executionLinks:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionLink'
        notes:
          type: string
        activeModules:
          type: array
          items:
            type: string
        abandonReason:
          type: string

    # ── Feedback Schemas ────────────────────────────────────────────────

    FeedbackRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        linkedArtifacts:
          type: array
          items:
            type: string
        outcome:
          $ref: '#/components/schemas/FeedbackOutcome'
        linkedTaskOrIdea:
          type: string
        owner:
          type: string
        createdDate:
          type: string
          format: date
        hasTaskLink:
          type: boolean
        isOrphan:
          type: boolean

    FeedbackLinkedArtifact:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [Task, Idea, Problem Statement]
        phase:
          type: string
        status:
          type: string

    FeedbackDetail:
      type: object
      properties:
        description:
          type: string
        outcome:
          $ref: '#/components/schemas/FeedbackOutcome'
        linkedArtifacts:
          type: array
          items:
            $ref: '#/components/schemas/FeedbackLinkedArtifact'
        activeModules:
          type: array
          items:
            type: string
        moduleContent:
          type: object
        notes:
          type: string

    # ── Resource Schemas ────────────────────────────────────────────────

    ResourceRow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        fileType:
          type: string
        docType:
          type: string
        owner:
          type: string
        version:
          type: string
        lastUpdated:
          type: string
        linkedCount:
          type: integer
        status:
          $ref: '#/components/schemas/ResourceStatus'

    ResourceLinkedArtifact:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [User Story, Problem Statement, Idea, Task]
        phase:
          type: string
        href:
          type: string

    ResourceVersion:
      type: object
      properties:
        version:
          type: string
        uploadedBy:
          type: string
        uploadDate:
          type: string
        description:
          type: string

    ResourceDetail:
      type: object
      properties:
        name:
          type: string
        fileType:
          type: string
        docType:
          type: string
        status:
          $ref: '#/components/schemas/ResourceStatus'
        description:
          type: string
        owner:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        fileSize:
          type: string
        linkedArtifacts:
          type: array
          items:
            $ref: '#/components/schemas/ResourceLinkedArtifact'
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ResourceVersion'
        notes:
          type: string

    # ── Page Schemas ────────────────────────────────────────────────────

    PageRow:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        owner:
          type: string
        lastEdited:
          type: string
          format: date
        linkedArtifactsCount:
          type: integer
        status:
          $ref: '#/components/schemas/PageStatus'
        isOrphan:
          type: boolean

    PageView:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [Document, Table, Board]

    PageDetail:
      type: object
      properties:
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        linkedArtifacts:
          type: array
          items:
            type: string
        docHeading:
          type: string
        docBody:
          type: string
        views:
          type: array
          items:
            $ref: '#/components/schemas/PageView'
        activeViewId:
          type: string
        tableData:
          type: array
          items:
            type: object

    # ── Calendar Schemas ────────────────────────────────────────────────

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          $ref: '#/components/schemas/CalendarEventType'
        start:
          type: string
          format: date
        end:
          type: string
          format: date
        startTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
        endTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
        allDay:
          type: boolean
        owner:
          type: string
        phase:
          $ref: '#/components/schemas/CalendarPhase'
        artifactType:
          $ref: '#/components/schemas/CalendarArtifactType'
        sourceTitle:
          type: string
        description:
          type: string
        location:
          type: string
        eventKind:
          type: string
        linkedArtifacts:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
        lastEdited:
          type: string

    # ── Error Schemas ───────────────────────────────────────────────────

    ValidationIssue:
      type: object
      required: [message]
      properties:
        path:
          type: string
        code:
          type: string
        message:
          type: string
        received:
          {}
        expected:
          {}

    ErrorDetail:
      type: object
      required: [message, status, code]
      properties:
        message:
          type: string
        status:
          type: integer
        code:
          type: string
        source:
          type: string
          enum: [app, client, server, network, validation, authorization, not-found, unknown]
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
        retryable:
          type: boolean
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    # ── Response Wrappers ───────────────────────────────────────────────

    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          {}

    PaginatedMeta:
      type: object
      properties:
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ErrorDetail'

  # ── Reusable Responses ──────────────────────────────────────────────

  responses:
    BadRequest:
      description: Validation error or malformed input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Validation failed
              status: 400
              code: VALIDATION_ERROR
              source: validation
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Authentication required
              status: 401
              code: UNAUTHORIZED
              source: authorization
    Forbidden:
      description: Authenticated but lacks required permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Permission denied
              status: 403
              code: PERMISSION_DENIED
              source: authorization
    NotFound:
      description: Resource does not exist or is out of scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Resource not found
              status: 404
              code: NOT_FOUND
              source: server
    Conflict:
      description: Duplicate resource or conflicting state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Resource already exists
              status: 409
              code: EMAIL_TAKEN
              source: server
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Too many requests
              status: 429
              code: RATE_LIMITED
              source: server
    InternalError:
      description: Unexpected server failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Internal server error
              status: 500
              code: INTERNAL_ERROR
              source: server

# ════════════════════════════════════════════════════════════════════════
# Paths
# ════════════════════════════════════════════════════════════════════════

paths:

  # ── Authentication ──────────────────────────────────────────────────

  /auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new user account
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirmPassword]
              properties:
                name:
                  type: string
                  minLength: 2
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 10
                  description: Must include uppercase, lowercase, digit, and special character
                confirmPassword:
                  type: string
      responses:
        '201':
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                          email:
                            type: string
                            format: email
                          isEmailVerified:
                            type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate and create a session
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
                remember:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session cookie (browser flow)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          email:
                            type: string
                            format: email
                      session:
                        type: object
                        properties:
                          token:
                            type: string
                          expiresAt:
                            type: string
                            format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email verification required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Invalidate the current session
      operationId: logout
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    nullable: true
                    example: null

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address with OTP
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [verificationId, code]
                  properties:
                    verificationId:
                      type: string
                    code:
                      type: string
                      pattern: '^\\d{6}$'
                - type: object
                  required: [token]
                  properties:
                    token:
                      type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [success]
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/resend-verification:
    post:
      tags: [Authentication]
      summary: Resend email verification OTP
      operationId: resendVerification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [sent]
                      verificationId:
                        type: string
                        description: Present when a pending account receives a new OTP challenge.
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request a password reset OTP
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returns success (prevents email enumeration)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [sent]
                      challengeId:
                        type: string
                        description: Present when a reset challenge can be used immediately.
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password using OTP challenge or legacy token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirmPassword]
              properties:
                token:
                  type: string
                  description: Legacy reset token path retained for compatibility.
                challengeId:
                  type: string
                  description: OTP reset challenge identifier.
                code:
                  type: string
                  pattern: '^[0-9]{6}$'
                  description: 6-digit OTP tied to challengeId.
                password:
                  type: string
                  minLength: 10
                confirmPassword:
                  type: string
              oneOf:
                - required: [challengeId, code, password, confirmPassword]
                - required: [token, password, confirmPassword]
      responses:
        '200':
          description: Password reset — all sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/change-password/request-otp:
    post:
      tags: [Authentication]
      summary: Request OTP for password change
      operationId: requestChangePasswordOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword]
              properties:
                currentPassword:
                  type: string
      responses:
        '200':
          description: Password change OTP created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [sent]
                      challengeId:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/change-password/confirm:
    post:
      tags: [Authentication]
      summary: Confirm password change with OTP
      operationId: confirmChangePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeId, code, currentPassword, password, confirmPassword]
              properties:
                challengeId:
                  type: string
                code:
                  type: string
                  pattern: '^[0-9]{6}$'
                currentPassword:
                  type: string
                password:
                  type: string
                  minLength: 10
                confirmPassword:
                  type: string
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ── Home ───────────────────────────────────────────────────────

  /home/dashboard:
    get:
      tags: [Home]
      summary: Get home dashboard overview
      operationId: getUserDashboard
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/HomeUser'
                      projects:
                        type: array
                        items:
                          $ref: '#/components/schemas/HomeProject'
                      invites:
                        type: array
                        items:
                          $ref: '#/components/schemas/HomeInvite'
                      notifications:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
                      activity:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActivityItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /home/projects:
    get:
      tags: [Home]
      summary: List all projects the user has access to
      operationId: getUserProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomeProject'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Home]
      summary: Create a new project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, icon]
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                icon:
                  $ref: '#/components/schemas/ProjectIconKey'
      responses:
        '201':
          description: Project created — user becomes Owner
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      projectId:
                        type: string
                      project:
                        $ref: '#/components/schemas/HomeProject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /home/projects/reference:
    get:
      tags: [Home]
      summary: Get reference data for project creation form
      operationId: getProjectCreationReference
      responses:
        '200':
          description: Reference data including existing project names and known user emails
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      existingProjects:
                        type: array
                        items:
                          type: string
                        description: Names of projects the user already belongs to (for duplicate detection)
                      existingUsers:
                        type: array
                        items:
                          type: string
                          format: email
                        description: Known user emails for invite auto-complete
        '401':
          $ref: '#/components/responses/Unauthorized'

  /home/invites:
    get:
      tags: [Home]
      summary: Get pending project invites
      operationId: getUserInvites
      responses:
        '200':
          description: Invite list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomeInvite'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /home/invites/{inviteId}/accept:
    post:
      tags: [Home]
      summary: Accept a project invite
      operationId: acceptProjectInvite
      parameters:
        - $ref: '#/components/parameters/inviteId'
      responses:
        '200':
          description: Invite accepted — user joined project
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      inviteId:
                        type: string
                      projectId:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /home/invites/{inviteId}/decline:
    post:
      tags: [Home]
      summary: Decline a project invite
      operationId: declineProjectInvite
      parameters:
        - $ref: '#/components/parameters/inviteId'
      responses:
        '200':
          description: Invite declined
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      inviteId:
                        type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /home/notifications:
    get:
      tags: [Home]
      summary: Get all notifications
      operationId: getUserNotifications
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /home/activity:
    get:
      tags: [Home, Activity]
      summary: Get full home activity stream
      operationId: getUserActivity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: type
          in: query
          schema:
            type: string
            enum: [Artifacts, Tasks, Feedback, Comments]
        - name: projectId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Activity stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /home/dashboard-activity:
    get:
      tags: [Home, Activity]
      summary: Get compact dashboard activity feed
      operationId: getUserDashboardActivity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Dashboard activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DashboardActivity'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /home/account:
    get:
      tags: [Home]
      summary: Get account settings
      operationId: getUserAccountSettings
      responses:
        '200':
          description: Account settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/AccountSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Home]
      summary: Update account settings
      operationId: updateUserAccountSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settings]
              properties:
                settings:
                  $ref: '#/components/schemas/AccountSettings'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      updatedAt:
                        type: string
                        format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /home/docs:
    get:
      tags: [Home]
      summary: Get documentation sections
      operationId: getUserDocsSections
      responses:
        '200':
          description: Documentation sections
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      sections:
                        type: array
                        items:
                          type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Project ─────────────────────────────────────────────────────────

  /projects/{projectId}/dashboard:
    get:
      tags: [Project]
      summary: Get project dashboard
      operationId: getProjectDashboard
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Project dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/ProjectInfo'
                      me:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          initials:
                            type: string
                      events:
                        type: array
                        items:
                          $ref: '#/components/schemas/DashboardEvent'
                      activity:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectActivity'
                      recentEdits:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecentEdit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/access:
    get:
      tags: [Project]
      summary: Get current user's role and permissions
      operationId: getProjectAccess
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Access info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/HomeUser'
                      role:
                        $ref: '#/components/schemas/ProjectRole'
                      permissionMask:
                        $ref: '#/components/schemas/PermissionMask'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{projectId}/navigation:
    get:
      tags: [Project]
      summary: Get project navigation data
      operationId: getProjectNavigation
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Navigation data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/ProjectNavigationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/settings:
    get:
      tags: [Project]
      summary: Get project settings
