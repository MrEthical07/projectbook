                  properties:
                    description:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
                    linkedArtifacts:
                      type: array
                      items:
                        type: string
                    docHeading:
                      type: string
                    docBody:
                      type: string
                    views:
                      type: array
                      items:
                        $ref: '#/components/schemas/PageView'
                    activeViewId:
                      type: string
                    tableData:
                      type: array
                      items:
                        type: object
      responses:
        '200':
          description: Page updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/PageRow'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/pages/{pageId}/rename:
    put:
      tags: [Pages]
      summary: Rename a page
      operationId: renamePage
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/pageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Page renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Calendar ───────────────────────────────────────────────────────

  /projects/{projectId}/calendar:
    get:
      tags: [Calendar]
      summary: Get all calendar events for a project
      operationId: getCalendarEvents
      parameters:
        - $ref: '#/components/parameters/projectId'
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Month filter (1-12)
        - name: year
          in: query
          schema:
            type: integer
          description: Year filter
        - name: phase
          in: query
          schema:
            $ref: '#/components/schemas/CalendarPhase'
      responses:
        '200':
          description: Calendar event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CalendarEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Calendar]
      summary: Create a manual calendar event
      operationId: createCalendarEvent
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, start]
              properties:
                title:
                  type: string
                  minLength: 1
                start:
                  type: string
                  format: date
                end:
                  type: string
                  format: date
                startTime:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
                endTime:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
                allDay:
                  type: boolean
                  default: true
                phase:
                  $ref: '#/components/schemas/CalendarPhase'
                description:
                  type: string
                location:
                  type: string
                eventKind:
                  type: string
                linkedArtifacts:
                  type: array
                  items:
                    type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Calendar event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/CalendarEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/calendar/{eventId}:
    get:
      tags: [Calendar]
      summary: Get calendar event detail
      operationId: getCalendarEventDetail
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/eventId'
      responses:
        '200':
          description: Calendar event detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/CalendarEvent'
                      reference:
                        type: object
                        properties:
                          artifactOptions:
                            type: array
                            items:
                              $ref: '#/components/schemas/ReferenceOption'
                          permissionMask:
                            $ref: '#/components/schemas/PermissionMask'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Calendar]
      summary: Update a calendar event
      operationId: updateCalendarEvent
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/eventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: object
                  properties:
                    title:
                      type: string
                    start:
                      type: string
                      format: date
                    end:
                      type: string
                      format: date
                    startTime:
                      type: string
                      pattern: '^\d{2}:\d{2}$'
                    endTime:
                      type: string
                      pattern: '^\d{2}:\d{2}$'
                    allDay:
                      type: boolean
                    phase:
                      $ref: '#/components/schemas/CalendarPhase'
                    description:
                      type: string
                    location:
                      type: string
                    eventKind:
                      type: string
                    linkedArtifacts:
                      type: array
                      items:
                        type: string
                    tags:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Calendar event updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/CalendarEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Calendar]
      summary: Delete a calendar event (manual events only)
      operationId: deleteCalendarEvent
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/eventId'
      responses:
        '200':
          description: Calendar event deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      eventId:
                        type: string
                      status:
                        type: string
                        enum: [Deleted]
        '400':
          description: Cannot delete derived events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Activity ───────────────────────────────────────────────────────

  /projects/{projectId}/activity:
    get:
      tags: [Activity]
      summary: Get project activity stream
      operationId: getProjectActivity
      parameters:
        - $ref: '#/components/parameters/projectId'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: type
          in: query
          schema:
            type: string
            enum: [Artifacts, Tasks, Feedback, Comments]
      responses:
        '200':
          description: Project activity stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectActivity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
