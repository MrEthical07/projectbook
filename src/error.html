<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% - %sveltekit.error.message%</title>
		<style>
			:root {
				color-scheme: light dark;
				font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 1rem;
				background: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.18), transparent 45%),
					radial-gradient(circle at 85% 30%, rgba(120, 119, 198, 0.12), transparent 40%),
					linear-gradient(135deg, #f8fafc, #eef2ff 40%, #f8fafc);
			}

			.card {
				width: min(32rem, 100%);
				padding: 2rem;
				border-radius: 1rem;
				background: rgba(255, 255, 255, 0.84);
				box-shadow: 0 24px 60px rgba(15, 23, 42, 0.15);
				backdrop-filter: blur(6px);
				text-align: center;
			}

			.status {
				font-size: 2.5rem;
				line-height: 1;
				margin: 0;
				font-weight: 700;
			}

			h1 {
				margin: 0.75rem 0 0;
				font-size: 1.25rem;
				font-weight: 600;
			}

			p {
				margin: 0.75rem 0 0;
				color: rgba(15, 23, 42, 0.8);
			}

			a {
				display: inline-block;
				margin-top: 1.25rem;
				padding: 0.6rem 1rem;
				border-radius: 0.6rem;
				text-decoration: none;
				background: #2563eb;
				color: #fff;
				font-weight: 600;
			}

			@media (prefers-color-scheme: dark) {
				body {
					background: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.22), transparent 45%),
						radial-gradient(circle at 85% 30%, rgba(120, 119, 198, 0.22), transparent 40%),
						linear-gradient(135deg, #0f172a, #111827 45%, #0f172a);
				}

				.card {
					background: rgba(17, 24, 39, 0.86);
					box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
				}

				p {
					color: rgba(226, 232, 240, 0.82);
				}
			}
		</style>
	</head>
	<body>
		<main class="card">
			<p class="status">%sveltekit.status%</p>
			<h1>Something went wrong</h1>
			<p>%sveltekit.error.message%</p>
			<a href="/">Go Home</a>
		</main>
	</body>
</html>
